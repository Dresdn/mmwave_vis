name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v3.2.0). Leave blank for :manual build from main."
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve tags
        id: tags
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          VERSION=""
          if [[ -n "$INPUT_TAG" ]]; then
            VERSION="$INPUT_TAG"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [[ -n "$VERSION" ]]; then
            echo "tags=ghcr.io/${{ steps.repo.outputs.name }}:${VERSION},ghcr.io/${{ steps.repo.outputs.name }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ steps.repo.outputs.name }}:manual" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
